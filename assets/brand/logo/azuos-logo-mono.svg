        font-size="44" letter-spacing="12" fill="currentColor">GRUPO</text>
  <text x="80" y="250" font-family="Inter, sans-serif" font-weight="800"
        font-size="130" letter-spacing="-2" fill="currentColor">azuos</text>
  <circle cx="548" cy="228" r="16" fill="currentColor"/>
</svg>
