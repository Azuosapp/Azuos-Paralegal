<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Grupo Azuos monocromático">
  <!-- Versão monocromática: usar sobre fundos onde só se pode uma cor. currentColor herda a cor do contexto. -->
