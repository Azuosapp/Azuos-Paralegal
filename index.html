function darCienciaEmTodasNovas() {
  if (bloqueioConsulta()) return;
  migrarConhecidasParaCiencia();
  if (!state.sessao) return;
  const usr = state.sessao.nome;
  state.ciencias_por_usuario[usr] = state.ciencias_por_usuario[usr] || [];
  const empresasAtivo = state.empresas.filter(e => (e.status||'').toUpperCase() === 'ATIVO');
  const minhasKeys = new Set(state.ciencias_por_usuario[usr].map(c => c.key));
  const novas = empresasAtivo.filter(e => !minhasKeys.has(empresaKey(e)));
  if (!novas.length) return;
  if (!confirm(`Dar ciência em todas as ${novas.length} novas empresas? Será registrada SUA ciência. Outros usuários continuam vendo até darem ciência.`)) return;
  const agora = new Date().toISOString();
  novas.forEach(e => {
    state.ciencias_por_usuario[usr].push({key: empresaKey(e), ciencia_em: agora});
  });
  log('Deu ciência em lote', novas.length + ' empresas');
  saveState();
  render();
  toast('✅ Ciência dada em ' + novas.length + ' empresas', 'emerald');
}

// ============ Aba Em Execução (v7.0) ============
let _execFiltroResp = '';
let _execFiltroData = ''; // YYYY-MM-DD

function renderEmExecucao() {
  migrarConhecidasParaCiencia();
  const ehAdmin = state.sessao && state.sessao.cargo === 'Administrador';
  const meuNome = state.sessao ? (state.sessao.email || state.sessao.nome) : '';
  // Coleta ciências de todos os usuários e indexa por (usuario, key)
  const todosUsuarios = Object.keys(state.ciencias_por_usuario || {});
  const cienciaPorKey = {}; // key -> array de {ciencia_por, ciencia_em}
  todosUsuarios.forEach(u => {
    (state.ciencias_por_usuario[u] || []).forEach(c => {
      cienciaPorKey[c.key] = cienciaPorKey[c.key] || [];
      cienciaPorKey[c.key].push({ciencia_por: u, ciencia_em: c.ciencia_em});
    });
  });

  // Empresas ATIVO com pelo menos uma ciência
  const empresasAtivo = state.empresas.filter(e => (e.status||'').toUpperCase() === 'ATIVO');
  let emExec = empresasAtivo.filter(e => cienciaPorKey[empresaKey(e)]).map(e => {
    const cienciasDela = cienciaPorKey[empresaKey(e)];
    // Pega ciência específica do usuário (paralegal) ou mostra todas (admin)
    const cienciaUsr = cienciasDela.find(c => c.ciencia_por === meuNome) || cienciasDela[0];
    return {
      ...e,
      ciencias: cienciasDela, // todas
      ciencia: cienciaUsr // a do usuário atual (ou primeira)
    };
  });

  // Para paralegal: só vê empresas onde ELE mesmo deu ciência
  if (!ehAdmin) {
    emExec = emExec.filter(e => e.ciencias.some(c => c.ciencia_por === meuNome));
    emExec = emExec.map(e => ({
      ...e,
      ciencia: e.ciencias.find(c => c.ciencia_por === meuNome) || e.ciencia
    }));
  } else if (_execFiltroResp) {
    emExec = emExec.filter(e => e.ciencias.some(c => c.ciencia_por === _execFiltroResp));
  }
  if (_execFiltroData) {
    emExec = emExec.filter(e => e.ciencias.some(c => (c.ciencia_em||'').startsWith(_execFiltroData)));
  }
  // Ordena por data de ciência decrescente
  emExec.sort((a,b) => (b.ciencia.ciencia_em||'').localeCompare(a.ciencia.ciencia_em||''));

  const respCienciaOpts = ehAdmin ? todosUsuarios.sort() : [];

  return `
    <div class="p-6">
      <header class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-2xl font-bold text-slate-800 mb-1">▶️ Em Execução</h1>
          ${ehAdmin ? `<button onclick="if(confirm('Replicar suas ciências (do Admin) para todos os outros usuários? Útil quando uma empresa já foi conferida pelo Admin e não precisa que cada paralegal dê ciência de novo.')) replicarCienciasAdminParaTodos();" class="mt-1 mb-1 text-xs text-blue-600 hover:underline">🔄 Replicar minhas ciências para todos os usuários</button>` : ''}

          <p class="text-sm text-slate-500">Empresas que já receberam ciência e estão em acompanhamento ${ehAdmin?`<span class="ml-2 px-2 py-0.5 bg-purple-100 text-purple-700 rounded-full text-[10px] font-bold uppercase tracking-wider">Visão Admin · todos</span>`:`<span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase tracking-wider">Suas ciências</span>`}</p>
        </div>
      </header>

      ${ehAdmin ? `
      <div class="bg-white rounded-xl shadow-sm p-3 mb-4 flex flex-wrap gap-2 items-center">
        <span class="text-xs font-semibold text-slate-600 uppercase">Filtrar:</span>
        <select id="exec-resp" class="px-2 py-1 text-xs border border-slate-200 rounded">
          <option value="">Todos que deram ciência</option>
          ${respCienciaOpts.map(r => `<option value="${esc(r)}" ${_execFiltroResp===r?'selected':''}>${esc(r)}</option>`).join('')}
        </select>
        <input type="date" id="exec-data" value="${esc(_execFiltroData||'')}" class="px-2 py-1 text-xs border border-slate-200 rounded">
        ${_execFiltroResp||_execFiltroData ? `<button onclick="_execFiltroResp='';_execFiltroData='';renderPartial();" class="text-xs text-blue-600 hover:underline">Limpar filtros</button>` : ''}
        <span class="ml-auto text-xs text-slate-500">${emExec.length} resultados</span>
      </div>` : ''}

      ${emExec.length === 0 ? `
        <div class="bg-slate-50 border border-slate-200 rounded-xl p-6 text-center">
          <div class="text-4xl mb-2">📭</div>
          <h3 class="font-bold text-slate-700 mb-1">Nenhuma empresa em execução</h3>
          <p class="text-sm text-slate-500">${ehAdmin?'Empresas com ciência dada aparecem aqui.':'Você ainda não deu ciência em nenhuma empresa. Vá em "Novas Empresas".'}</p>
        </div>
      ` : `
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50">
              <tr>
                <th class="text-left px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Empresa</th>
                <th class="text-left px-3 py-2 font-semibold text-slate-600 text-xs uppercase">CNPJ</th>
                <th class="text-left px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Responsável</th>
                <th class="text-left px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Ciência por</th>
                <th class="text-left px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Ciência em</th>
                <th class="text-center px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Alvarás</th>
                <th class="text-right px-3 py-2 font-semibold text-slate-600 text-xs uppercase">Ações</th>
              </tr>
            </thead>
            <tbody>
              ${emExec.slice(0, 500).map(e => {
                const alvs = state.alvaras.filter(a => a.empresa_id === e.id);
                const dataFmt = e.ciencia.ciencia_em ? new Date(e.ciencia.ciencia_em).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
                const ehMigrado = e.ciencia.ciencia_por === 'Sistema (migrado)';
                return `<tr class="border-t border-slate-100 hover:bg-blue-50 cursor-pointer exec-row" data-eid="${e.id}" title="Clique para ver os alvarás">
                  <td class="px-3 py-2 font-medium text-blue-700 hover:underline max-w-[280px] truncate" title="${esc(e.nome)}">${esc(e.nome)}</td>
                  <td class="px-3 py-2 text-xs text-slate-500 font-mono">${esc(e.cnpj||'-')}</td>
                  <td class="px-3 py-2 text-xs text-slate-600">${esc(e.responsavel||'-')}</td>
                  <td class="px-3 py-2 text-xs">${ehAdmin && e.ciencias.length > 1 ? e.ciencias.map(c => `<span class="px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded text-[10px] font-semibold mr-1 mb-0.5 inline-block">${esc(c.ciencia_por)}</span>`).join('') : `<span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded text-[10px] font-semibold">${esc(e.ciencia.ciencia_por)}</span>`}</td>
                  <td class="px-3 py-2 text-xs text-slate-600">${esc(dataFmt)}</td>
                  <td class="px-3 py-2 text-center font-bold text-blue-600">${alvs.length}</td>
                  <td class="px-3 py-2 text-right text-xs whitespace-nowrap" onclick="event.stopPropagation()">
                    <button onclick="event.stopPropagation();setState({empresaAtiva:${e.id}})" class="px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100">👁️ Ver alvarás</button>
                    ${ehAdmin?`<button onclick="event.stopPropagation();removerCiencia(${e.id})" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100" title="Remover ciência (volta para Novas)">↩</button>`:''}
                  </td>
                </tr>`;
              }).join('')}
              ${emExec.length > 500 ? `<tr><td colspan="7" class="px-4 py-2 text-center text-slate-400 text-[10px]">Mostrando primeiras 500 de ${emExec.length}</td></tr>` : ''}
            </tbody>
          </table>
        </div>
      </div>`}
    </div>
  `;
}

function attachEmExecucao() {
  const sel = document.getElementById('exec-resp');
  if (sel) sel.onchange = (ev) => { _execFiltroResp = ev.target.value; renderPartial(); };
  const inp = document.getElementById('exec-data');
  if (inp) inp.onchange = (ev) => { _execFiltroData = ev.target.value; renderPartial(); };
  // Linha clicável
  document.querySelectorAll('.exec-row').forEach(r => {
    r.onclick = (ev) => {
      if (ev.target.closest('button')) return;
      setState({empresaAtiva: parseInt(r.dataset.eid)});
    };
  });
}

function removerCiencia(empresaId) {
  if (bloqueioConsulta()) return;
  const e = state.empresas.find(x => x.id === empresaId);
  if (!e) return;
  // Admin pode remover de UM usuário específico ou de todos
  const k = empresaKey(e);
  const usr = state.sessao.nome;
  // Se Admin clicou em remover, pergunta de qual usuário
  if (state.sessao.cargo === 'Administrador') {
    const todos = Object.keys(state.ciencias_por_usuario || {}).filter(u => (state.ciencias_por_usuario[u]||[]).find(c => c.key === k));
    if (!todos.length) return;
    if (todos.length === 1) {
      if (!confirm(`Remover ciência de "${e.nome}" registrada por "${todos[0]}"? Vai voltar para Novas Empresas de ${todos[0]}.`)) return;
      state.ciencias_por_usuario[todos[0]] = state.ciencias_por_usuario[todos[0]].filter(c => c.key !== k);
    } else {
      if (!confirm(`Esta empresa tem ciência de ${todos.length} usuários (${todos.join(', ')}). Confirma remover de TODOS?`)) return;
      todos.forEach(u => {
        state.ciencias_por_usuario[u] = state.ciencias_por_usuario[u].filter(c => c.key !== k);
      });
    }
  } else {
    // Paralegal só remove a própria ciência
    if (!confirm(`Remover SUA ciência de "${e.nome}"? Ela volta para Novas Empresas.`)) return;
    state.ciencias_por_usuario[usr] = (state.ciencias_por_usuario[usr]||[]).filter(c => c.key !== k);
  }
  log('Removeu ciência', e.nome);
  saveState();
  render();
  toast('↩ Empresa voltou para Novas', 'amber');
}

// Hook: após cada sync, re-injetar empresas manuais
function reinjetarEmpresasManuais() {
  if (!state.empresas_manuais || !state.empresas_manuais.length) return;
  const idsAtuais = new Set(state.empresas.map(e => e.id));
  let novos = 0;
  state.empresas_manuais.forEach(em => {
    // Verifica se já não existe (por nome+cnpj — pode ter virado oficial na planilha)
    const k = (em.nome||'').trim() + '|' + (em.cnpj||'').trim();
    const existe = state.empresas.find(e => ((e.nome||'').trim() + '|' + (e.cnpj||'').trim()) === k);
    if (!existe) {

      em.id = Math.max(0, ...state.empresas.map(e => e.id||0)) + 1;
      state.empresas.push(em);
      novos++;
    }
  });

}


// === Baseline: deixa só as N mais recentes como novas, resto vira conhecido para TODOS (v7.11) ===
function definirBaselineQuantidade(qtdNovasManter) {
  const n = parseInt(qtdNovasManter) || 0;
  state.ciencias_por_usuario = state.ciencias_por_usuario || {};
  const empresasAtivo = state.empresas.filter(e => (e.status||'').toUpperCase() === 'ATIVO');
  // Ordena por id DECRESCENTE — IDs maiores são empresas que entraram depois (mais recentes)
  const ordenadas = [...empresasAtivo].sort((a,b) => (b.id||0) - (a.id||0));
  const manterNovas = ordenadas.slice(0, n); // top N
  const marcarComoVistas = ordenadas.slice(n); // resto
  const keysVistas = new Set(marcarComoVistas.map(e => empresaKey(e)));
  const todosUsuarios = (state.usuarios || []).filter(u => u.ativo).map(u => u.nome);
  if (!todosUsuarios.length) todosUsuarios.push('AZUOS (Admin)');
  const agora = new Date().toISOString();
  let inseridos = 0;
  todosUsuarios.forEach(usr => {
    state.ciencias_por_usuario[usr] = state.ciencias_por_usuario[usr] || [];
    const jaTem = new Set(state.ciencias_por_usuario[usr].map(c => c.key));
    keysVistas.forEach(k => {
      if (!jaTem.has(k)) {
        state.ciencias_por_usuario[usr].push({key: k, ciencia_em: agora});
        inseridos++;
      }
    });
  });
  log('Definiu baseline', `${marcarComoVistas.length} marcadas, ${manterNovas.length} novas mantidas`);
  saveState();
  render();
  toast(`✅ Baseline definida: ${marcarComoVistas.length} marcadas como vistas para ${todosUsuarios.length} usuários · ${manterNovas.length} continuam novas`, 'emerald');
}

function abrirBaselineDialog() {
  const empresasAtivo = state.empresas.filter(e => (e.status||'').toUpperCase() === 'ATIVO');
  const usr = state.sessao ? (state.sessao.email || state.sessao.nome) : '';
  const minhas = (state.ciencias_por_usuario && state.ciencias_por_usuario[usr]) || [];
  const minhasKeys = new Set(minhas.map(c => c.key));
  const minhasNovas = empresasAtivo.filter(e => !minhasKeys.has(empresaKey(e))).length;
  const sugestao = prompt(`Você tem ${minhasNovas} empresas marcadas como novas. Quantas das MAIS RECENTES quer MANTER como novas? (As demais ${Math.max(0,minhasNovas - 9)} serão marcadas como conhecidas para TODOS os usuários)`, '9');
  if (sugestao === null) return;
  const n = parseInt(sugestao);
  if (isNaN(n) || n < 0) { alert('Valor inválido'); return; }
  if (!confirm(`Manter apenas as ${n} empresas mais recentes como novas? Outras ${Math.max(0, minhasNovas-n)} serão marcadas como vistas para Admin + todos os Paralegais.`)) return;
  definirBaselineQuantidade(n);
}

(function ocultarElementosLegadosPatch(){
  var KEYWORDS_OCULTAR = [
    'reset demo',
    'v7.12',
    'baseline rapido',
    'baseline rápido',
    'exportar config',
    'importar config'
  ];
  function ehLegado(texto){
    if (!texto) return false;
    var t = texto.toLowerCase().trim();
    return KEYWORDS_OCULTAR.some(function(k){ return t.indexOf(k) !== -1; });
  }
  function ocultar(){
    try {
      var alvos = document.querySelectorAll('button, .badge, .version-badge, [class*="rodape"], [class*="footer"]');
      alvos.forEach(function(el){
        var txt = (el.textContent || '').trim();
        if (txt && txt.length < 60 && ehLegado(txt)) {
          el.style.display = 'none';
          el.setAttribute('data-legado-oculto', '1');
        }
      });
    } catch(e){ console.warn('[v5.7.8] ocultar erro:', e); }
  }
  // Esconder ao carregar e periodicamente
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ocultar);
  } else {
    ocultar();
  }
  setInterval(ocultar, 1500);
  console.log('[v5.7.8] ocultador de elementos legados ativo');
})();

/* ===== v5.7.19 — Version check + force reload ===== */
(function versionCheck(){
  var SYSTEM_VERSION = 'v5.7.19';
  function checkVersion(){
    try {
      if (!firebase || !firebase.firestore) return;
      var db = firebase.firestore();
      // Salvar versao deste browser no Firestore
      db.collection('azuos').doc('_version').get().then(function(doc){
        var serverVersion = doc.exists ? doc.data().version : null;
        if (!serverVersion) {
          // Primeira execucao - salvar
          db.collection('azuos').doc('_version').set({version: SYSTEM_VERSION, ts: Date.now()});
        } else if (serverVersion !== SYSTEM_VERSION) {
          // Versões diferentes - ALERTAR usuário e recarregar
          console.warn('[v5.7.19] versão deste browser:', SYSTEM_VERSION, 'servidor:', serverVersion);
          if (compararVersao(serverVersion, SYSTEM_VERSION) > 0) {
            // Server tem versão MAIS NOVA - recarregar
            if (confirm('🔄 Nova versão disponível ('+serverVersion+'). Atualizar agora?')) {
              try { localStorage.clear(); } catch(e){}
              location.reload(true);
            }
          } else {
            // Nosso browser tem versão mais nova - atualizar Firestore
            db.collection('azuos').doc('_version').set({version: SYSTEM_VERSION, ts: Date.now()});
          }
        }
      }).catch(function(e){ console.warn('[v5.7.19 check]', e.message); });
    } catch(e) { console.warn('[v5.7.19]', e); }
  }
  function compararVersao(a, b){
    var pa = String(a).replace(/[^0-9.]/g, '').split('.').map(Number);
    var pb = String(b).replace(/[^0-9.]/g, '').split('.').map(Number);
    for (var i = 0; i < Math.max(pa.length, pb.length); i++) {
      var na = pa[i] || 0, nb = pb[i] || 0;
      if (na > nb) return 1;
      if (na < nb) return -1;
    }
    return 0;
  }
  setTimeout(checkVersion, 8000);
  setInterval(checkVersion, 60000); // a cada minuto
  console.log('[v5.7.19] version check ativo - SYSTEM_VERSION=' + SYSTEM_VERSION);
})();

/* ===== v5.7.24 — Esconder legados via CSS + aplicar uma vez ===== */
(function antiFlickerPatch(){
  // CSS pra esconder badges legados (sem JS)
  var css = `
    /* v7.12, baseline rapido badges */
    .version-badge:has-text("v7.12"), .badge:has-text("v7.12") { display: none !important; }
  `;
  var style = document.createElement('style');
  style.id = 'v5_7_24_style';
  style.textContent = css;
  document.head.appendChild(style);

  // Esconder via JS UMA VEZ no boot (em DOMContentLoaded ou já carregado)
  var esconderFeito = false;
  function esconderLegadosUmaVez(){
    if (esconderFeito) return;
    try {
      document.querySelectorAll('div, span, button, p, small, a, label').forEach(function(el){
        if (!el.children || el.children.length > 2) return;
        var txt = (el.textContent || '').trim().toLowerCase();
        if (!txt || txt.length > 80) return;
        if (txt.indexOf('v7.12') >= 0 || txt.indexOf('baseline rapido') >= 0 || txt.indexOf('baseline rápido') >= 0) {
          el.style.display = 'none';
        }
      });
      esconderFeito = true;
    } catch(e){}
  }

  // MutationObserver: detecta novos elementos (não usa setInterval)
  var observer = new MutationObserver(function(mutations){
    var temNovos = false;
    mutations.forEach(function(m){
      if (m.addedNodes && m.addedNodes.length > 0) temNovos = true;
    });
    if (temNovos) {
      esconderFeito = false;
      esconderLegadosUmaVez();
    }
  });
  observer.observe(document.body || document.documentElement, { childList: true, subtree: true });

  // Esconder agora
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', esconderLegadosUmaVez);
  } else {
    esconderLegadosUmaVez();
  }
  setTimeout(esconderLegadosUmaVez, 2000);

  console.log('[v5.7.24] anti-flicker ativo (observer-based)');
})();

(function ordenacaoEmpresas(){
  if (!window._ordEmpresas) window._ordEmpresas = { coluna: null, asc: true };
  function calcAndamento(emp){
    try {
      var alvaras = (state.alvaras || []).filter(function(a){ return a && (a.empresa_id === emp.id || a.cnpj === emp.cnpj); });
      if (alvaras.length === 0) return 0;
      var concl = alvaras.filter(function(a){ var s = (a.status||'').toLowerCase(); return s.indexOf('conclu') >= 0 || s.indexOf('formaliz') >= 0; }).length;
      return Math.round((concl / alvaras.length) * 100);
    } catch(e){ return 0; }
  }
  function ordenar(coluna){
    if (!Array.isArray(state.empresas)) return;
    if (window._ordEmpresas.coluna === coluna) window._ordEmpresas.asc = !window._ordEmpresas.asc;
    else { window._ordEmpresas.coluna = coluna; window._ordEmpresas.asc = true; }
    var asc = window._ordEmpresas.asc ? 1 : -1;
    state.empresas.sort(function(a,b){
      var va, vb;
      if (coluna === 'nome') { va = (a.nome||'').toLowerCase(); vb = (b.nome||'').toLowerCase(); }
      else if (coluna === 'andamento') { va = calcAndamento(a); vb = calcAndamento(b); }
      else if (coluna === 'cnpj') { va = (a.cnpj||''); vb = (b.cnpj||''); }
      else if (coluna === 'cidade') { va = (a.cidade||'').toLowerCase(); vb = (b.cidade||'').toLowerCase(); }
      else if (coluna === 'responsavel') { va = (a.responsavel||'').toLowerCase(); vb = (b.responsavel||'').toLowerCase(); }
      else return 0;
      if (va < vb) return -1 * asc;
      if (va > vb) return 1 * asc;
      return 0;
    });
    try { if (typeof renderEmpresas === 'function') renderEmpresas(); } catch(e){}
    try { if (typeof render === 'function') render(); } catch(e){}
  }
  window._ordenarEmpresas = ordenar;
  function tornarHeadersClicaveis(){
    try {
      var thList = document.querySelectorAll('table th');
      if (thList.length === 0) return;
      thList.forEach(function(th){
        if (th.dataset.ordAplicado) return;
        var txt = (th.textContent||'').trim().toLowerCase();
        var coluna = null;
        if (txt === 'empresa') coluna = 'nome';
        else if (txt === 'andamento') coluna = 'andamento';
        else if (txt === 'cnpj') coluna = 'cnpj';
        else if (txt === 'cidade') coluna = 'cidade';
        else if (txt === 'responsável' || txt === 'responsavel') coluna = 'responsavel';
        if (!coluna) return;
        th.dataset.ordAplicado = '1';
        th.style.cursor = 'pointer';
        th.style.userSelect = 'none';
        th.title = 'Clique para ordenar';
        var span = document.createElement('span');
        span.style.marginLeft = '4px';
        span.style.opacity = '0.6';
        span.style.fontSize = '11px';
        span.dataset.ordIndicator = coluna;
        span.textContent = '⇅';
        th.appendChild(span);
        th.addEventListener('click', function(){
          ordenar(coluna);
          document.querySelectorAll('[data-ord-indicator]').forEach(function(s){
            if (s.dataset.ordIndicator === coluna) { s.textContent = window._ordEmpresas.asc ? '▲' : '▼'; s.style.opacity = '1'; }
            else { s.textContent = '⇅'; s.style.opacity = '0.4'; }
          });
        });
      });
    } catch(e){}
  }
  var observer = new MutationObserver(function(){ tornarHeadersClicaveis(); });
  observer.observe(document.body, { childList: true, subtree: true });
  setTimeout(tornarHeadersClicaveis, 1000);
  setTimeout(tornarHeadersClicaveis, 3000);
  console.log('[v5.7.26] ordenacao por colunas ativa');
})();

(function fixFiltros(){
  try {
    // Limpar todas localStorage keys de filtros antigas pra não confundir
    Object.keys(localStorage).forEach(function(k){
      if (k.indexOf('azuos_filtros_') === 0) {
        try {
          var data = JSON.parse(localStorage.getItem(k));
          // Limpar valores que podem confundir (senhas, emails de cadastro, etc)
          if (data && typeof data === 'object') {
            Object.keys(data).forEach(function(field){
              // Manter apenas se for filtro óbvio
              var v = data[field];
              if (!v || typeof v !== 'string') return;
              var lc = field.toLowerCase();
              // Remover se NÃO for filtro
              if (lc.includes('senha') || lc.includes('password') || lc.includes('email') || lc.includes('cnpj') || lc.includes('nome')) {
                delete data[field];
              }
            });
            localStorage.setItem(k, JSON.stringify(data));
          }
        } catch(e){}
      }
    });

    // Substituir comportamento do filtro: só salva inputs com placeholder de busca + selects com opção ATIVO/INATIVO/responsável
    function ehFiltro(el){
      if (!el) return false;
      var ph = ((el.placeholder || '') + '').toLowerCase();
      if (ph.includes('busca') || ph.includes('pesquis') || ph.includes('filtro')) return true;
      // Selects com opções de responsável ou ativo/inativo
      if (el.tagName === 'SELECT') {
        var opts = el.querySelectorAll('option');
        for (var i = 0; i < opts.length; i++) {
          var t = (opts[i].textContent || '').trim().toLowerCase();
          if (t === 'ativo' || t === 'inativo' || t.includes('todos os respons')) return true;
        }
      }
      // Inputs em modal NÃO são filtro
      var el2 = el;
      while (el2 && el2 !== document.body) {
        if (el2.id && el2.id.toLowerCase().includes('modal')) return false;
        if (el2.getAttribute && el2.getAttribute('role') === 'dialog') return false;
        if (el2.style && el2.style.position === 'fixed' && el2.style.zIndex > 1000) return false;
        el2 = el2.parentElement;
      }
      return false;
    }

    function getKey(){ var u = state && state.sessao && state.sessao.email; return 'azuos_filtros_' + (u || 'anon'); }

    function salvarSeguro(){
      try {
        var f = {};
        document.querySelectorAll('input, select').forEach(function(el){
          if (!ehFiltro(el)) return;
          var key = el.id || el.name || (el.placeholder || '').substring(0,30);
          if (key && el.value) f[key] = el.value;
        });
        if (Object.keys(f).length > 0) localStorage.setItem(getKey(), JSON.stringify(f));
      } catch(e){}
    }

    function restaurarSeguro(){
      try {
        var raw = localStorage.getItem(getKey());
        if (!raw) return;
        var f = JSON.parse(raw);
        document.querySelectorAll('input, select').forEach(function(el){
          if (!ehFiltro(el)) return;
          var key = el.id || el.name || (el.placeholder || '').substring(0,30);
          if (key && f[key] && !el.value) {
            el.value = f[key];
            el.dispatchEvent(new Event('change', {bubbles:true}));
            el.dispatchEvent(new Event('input', {bubbles:true}));
          }
        });
      } catch(e){}
    }

    // Substituir handlers anteriores (não posso desabilitar do v5.7.27, mas o novo sobrepõe)
    document.addEventListener('change', function(e){
      if (e.target && (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') && ehFiltro(e.target)) {
        salvarSeguro();
      }
    }, true);

    setTimeout(restaurarSeguro, 3500);
    console.log('[v5.7.29] filtros seguros ativados');
  } catch(e){ console.warn('[v5.7.29]', e); }

      if(!state||!state.alvaras||!state.edicoes_alvaras) return;
      var email=getEmail();
      var agora=new Date().toISOString();
      var atualizados=0;
      state.alvaras.forEach(function(a){
        if(!a||!a.id) return;
        if(!window._sigCache) window._sigCache={};
        var sigAtual=sig(a);
        var sigAnt=window._sigCache[a.id];
        if(sigAnt===undefined){window._sigCache[a.id]=sigAtual;return;}
        if(sigAnt!==sigAtual){
          window._sigCache[a.id]=sigAtual;
          state.edicoes_alvaras[a.id]={
            ...state.edicoes_alvaras[a.id],
            _editado_por:email,
            _editado_em:agora,
            _editado_manualmente:true,
            empresa:a.empresa,empresa_id:a.empresa_id,tipo:a.tipo,
            status:a.status,observacao:a.observacao,proxima_atualizacao:a.proxima_atualizacao,
            responsavel:a.responsavel,cidade:a.cidade,vencimento:a.vencimento
          };
          atualizados++;
        }
      });
      if(atualizados>0){
        console.log('[v5.7.52] '+atualizados+' edicoes capturadas. Salvando...');
        // Forca write
        if(firebase&&firebase.firestore){
          firebase.firestore().collection('azuos').doc('shared').update({
            edicoes_alvaras:state.edicoes_alvaras,
            alvaras:state.alvaras
          }).catch(function(e){console.error('[v5.7.52 write erro]',e);});
        }
      }
    }catch(e){console.warn('[v5.7.52 hook]',e);}
  },4000);
}

// Espera state carregar
var ivW=setInterval(function(){
  if(state&&state.alvaras&&state.alvaras.length>0&&firebase&&firebase.firestore){
    clearInterval(ivW);
    setTimeout(autoRecuperar,3000); // 3s pra estabilizar
    setTimeout(hookAtivo,8000); // 8s depois ativa hook
  }
},1000);
setTimeout(function(){clearInterval(ivW);},60000);
console.log('[v5.7.52] armado');
}catch(e){console.warn('[v5.7.52]',e);}
})();

</script>
